spring:
  application:
    name: camping-admin-service-test

  datasource:
    url: jdbc:h2:mem:testdb-test;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true
  sql:
    init:
      mode: always

server:
  port: 0  # 랜덤 포트 사용

logging:
  level:
    com.camping.admin: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

jwt:
  secret: "test-secret-key-for-testing-only"
  expiration-minutes: 30

admin:
  username: admin
  password: admin123