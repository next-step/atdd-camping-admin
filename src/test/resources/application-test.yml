spring:
  application:
    name: camping-admin-service-test
  
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
        
server:
  port: 8081
  
logging:
  level:
    com.camping.admin: DEBUG
    org.hibernate.SQL: DEBUG

jwt:
  secret: "test-secret-key-for-cucumber-tests"
  expiration-minutes: 30

admin:
  username: admin
  password: admin123

# 테스트용 컨트롤러 활성화
spring.profiles.active: test